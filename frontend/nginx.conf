server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }

    location /admin/ {
        set $backend_upstream_admin http://backend:8000;
        proxy_pass $backend_upstream_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /static/ {
        set $backend_upstream_static http://backend:8000;
        proxy_pass $backend_upstream_static;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /media/ {
        set $backend_upstream_media http://backend:8000;
        proxy_pass $backend_upstream_media;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
