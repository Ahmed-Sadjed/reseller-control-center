services:
  backend:
    build: ./backend
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --timeout 120 --workers 4 --reload
      "
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - DJANGO_SETTINGS_MODULE=config.settings
    env_file:
      - .env
    restart: always

  worker:
    build: ./backend
    command: python manage.py rqworker default
    volumes:
      - ./backend:/app
      - media_data:/app/media
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    env_file:
      - .env
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  media_data:
